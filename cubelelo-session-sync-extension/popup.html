<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --primary: #10B981;
      --primary-dark: #059669;
      --bg: #F9FAFB;
      --text: #1F2937;
      --border: #E5E7EB;
      --card-bg: #FFFFFF;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 320px;
      background-color: var(--bg);
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
    }
    * {
      box-sizing: border-box;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background-color: var(--primary);
      border-radius: 12px;
      color: white;
      font-weight: 900;
      font-size: 22px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      margin-bottom: 6px;
    }
    h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.025em;
    }
    p.subtitle {
      margin: 2px 0 0 0;
      font-size: 10px;
      color: #9CA3AF;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .card {
      background: var(--card-bg);
      border: 1px border var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #4B5563;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, select {
      width: 100%;
      padding: 8px 12px;
      font-size: 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 16px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15);
    }
    .btn:hover {
      background-color: var(--primary-dark);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:disabled {
      background-color: #D1D5DB;
      color: #9CA3AF;
      box-shadow: none;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      background-color: #F3F4F6;
      border: 1px solid var(--border);
      max-height: 80px;
      overflow-y: auto;
    }
    .info {
      font-size: 11px;
      color: #6B7280;
      text-align: center;
      margin-top: 10px;
      line-height: 1.4;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .badge-detected {
      background-color: #D1FAE5;
      color: #065F46;
    }
    .badge-missing {
      background-color: #FEE2E2;
      color: #991B1B;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">C</div>
    <h3>Cubelelo Session Sync</h3>
    <p class="subtitle">Cloud Integration Utility</p>
  </div>

  <div class="card">
    <label for="apiUrl">Render Server URL</label>
    <input type="text" id="apiUrl" placeholder="https://your-app.onrender.com" value="http://localhost:3000">
  </div>

  <div class="card">
    <label for="portalSelect">Target Portal</label>
    <select id="portalSelect" style="margin-bottom: 8px;">
      <option value="flipkart">Flipkart Vendor Hub</option>
      <option value="instamart">Instamart Partner</option>
      <option value="blinkit">Blinkit PartnersBiz</option>
      <option value="zepto">Zepto Brands</option>
    </select>
    <div id="detectionBadge" class="badge badge-missing">Detecting Active Page...</div>
  </div>

  <button id="syncBtn" class="btn" disabled>Sync Session to Cloud</button>

  <div id="statusConsole" class="status">Console: Ready.</div>

  <div class="info">
    Open the portal, log in successfully with OTP/Captcha, then click <strong>Sync Session</strong> to upload credentials to your cloud service.
  </div>

  <script src="popup.js"></script>
</body>
</html>
